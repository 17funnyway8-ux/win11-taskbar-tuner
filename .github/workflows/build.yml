name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Win11 Taskbar Tuner
    runs-on: windows-latest
    
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64
    
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.configuration }}
    
    - name: Build
      id: build_step
      continue-on-error: true
      run: cmake --build build --config ${{ matrix.configuration }} 2>&1 | tee build-output.log
      shell: bash
    
    - name: Commit build log to repo
      if: always()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add build-output.log
        git commit -m "build log [skip ci]" || true
        git push origin master || true
      shell: bash
    
    - name: Upload artifact (on success)
      if: steps.build_step.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: Win11TaskbarTuner-${{ matrix.configuration }}-x64
        path: build/${{ matrix.configuration }}/Win11TaskbarTuner.exe
